# ── Railway Nixpacks Configuration ─────────────────────────────────────────────
# Ensures Trivy CLI, git, and Node.js 20 are available at both build AND runtime.

[phases.setup]
nixPkgs = ["nodejs_20", "git", "trivy"]
# nixInclude injects these Nix store paths into the runtime image,
# preventing Nixpacks from stripping Trivy out of the final layer.
nixLibs = []

[phases.install]
cmds = ["npm install"]

# Verify Trivy is available after build — this line appears in deploy logs
# and confirms the binary survived into the runtime image.
[phases.build]
cmds = ["which trivy && trivy version || echo 'WARNING: trivy not found after build'"]

[start]
cmd = "node server/index.js"
