[phases.setup]
nixPkgs = ["nodejs_20", "curl", "git"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "mkdir -p ./bin",
  "curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b ./bin && echo '[TRIVY] Binary installed at ./bin/trivy' || echo '[TRIVY] Install failed — TrivyLite fallback will be used'",
  "ls -la ./bin/ || echo '[TRIVY] bin/ directory empty'"
]

[start]
cmd = "node server/index.js"
